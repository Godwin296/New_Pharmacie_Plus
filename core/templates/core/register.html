{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouverture de Dossier | {{ p_nom|default:"Pharmacie+" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    
    <style>
        body {
            background: radial-gradient(circle at center, #1a4d2e 0%, #0a1f13 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: move-stars 100s linear infinite;
        }
        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 40px;
        }

        .saas-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .saas-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
            outline: none;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="relative z-10 w-full max-w-lg px-4 py-10">
        <div class="text-center mb-8">
            {% if p_logo %}
                <img src="{{ p_logo.url }}" class="h-20 w-20 mx-auto mb-4 rounded-3xl border-2 border-green-500 shadow-[0_0_20px_rgba(34,197,94,0.5)]">
            {% endif %}
            <h1 class="text-4xl font-black text-white tracking-tighter">{{ p_nom|default:"PHARMACIE +" }}</h1>
            <p class="text-green-400 text-[10px] font-black uppercase tracking-[0.3em] mt-2">Création d'un Compte Client.</p>
        </div>

        <div class="glass-card p-8 md:p-10">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <div class="relative">
                    <span class="absolute left-4 top-4 text-white/30"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="saas-input w-full py-4 pl-12 pr-4 rounded-2xl font-semibold" placeholder="Nom d'utilisateur" required>
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-4 text-white/30"><i class="bi bi-person-badge"></i></span>
                    <input type="text" name="nom" class="saas-input w-full py-4 pl-12 pr-4 rounded-2xl font-semibold" placeholder="Nom complet" required>
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-4 text-white/30"><i class="bi bi-telephone"></i></span>
                    <input type="tel" name="telephone" class="saas-input w-full py-4 pl-12 pr-4 rounded-2xl font-semibold" placeholder="Numéro de téléphone" required>
                </div>

                <div class="relative">
                    <span class="absolute left-4 top-4 text-white/30"><i class="bi bi-key"></i></span>
                    <input type="password" name="password" class="saas-input w-full py-4 pl-12 pr-4 rounded-2xl font-semibold" placeholder="Mot de passe" required>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-green-900/30 flex justify-between items-center px-10 transition-all transform hover:scale-[1.02]">
                        <span>CREER MON COMPTE</span>
                        <i class="bi bi-arrow-right-circle-fill"></i>
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center border-t border-white/10 pt-6">
                <p class="text-white/40 text-xs mb-2">Déjà inscrit ?</p>
                <a href="{% url 'login' %}" class="text-green-400 font-black no-underline uppercase tracking-widest text-[10px] hover:text-white transition">
                    Retour au Portail de Connexion 🛰️
                </a>
            </div>
        </div>
    </div>
</body>
</html>
