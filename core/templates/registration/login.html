{% extends "core/base.html" %}
{% block title %}Connexion - Pharmacie+{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="bg-success py-3 text-center">
                <i class="bi bi-shield-lock text-white fs-1"></i>
            </div>
            <div class="card-body p-4 p-lg-5">
                <h2 class="text-center fw-bold mb-4">Accès Client</h2>
                
                <!-- Affichage des erreurs de connexion -->
                {% if form.errors %}
                <div class="alert alert-danger border-0 small rounded-3 mb-4">
                    <i class="bi bi-exclamation-circle me-2"></i>Identifiants incorrects.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Nom d'utilisateur</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control bg-light border-0" placeholder="Utilisateur" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-key"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill shadow-sm">
                        Se connecter
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="mb-0 small text-muted">Besoin d'aide ?</p>
                    <a href="mailto:admin@pharmacieplus.com" class="small text-success text-decoration-none">Contacter le support médical</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
